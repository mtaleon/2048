name: Deploy to GitLab Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitLab

      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_DEPLOY_USERNAME }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          set -x  # Enable debug output
          echo "Configuring git..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          echo "Adding GitLab remote..."
          echo "GITLAB_REPO: ${GITLAB_REPO}"
          echo "GITLAB_USERNAME: ${GITLAB_USERNAME}"
          echo "GITLAB_TOKEN length: ${#GITLAB_TOKEN}"

          git remote add gitlab "https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@${GITLAB_REPO}" || {
            echo "ERROR: Failed to add GitLab remote"
            exit 1
          }

          echo "Pushing to GitLab..."
          git push gitlab main --force -v || {
            echo "ERROR: Failed to push to GitLab"
            exit 1
          }

          echo "✅ Successfully mirrored to GitLab"

      - name: Wait for GitLab CI
        run: |
          echo "✅ Source mirrored to GitLab"
          echo "GitLab CI will build and deploy to Pages automatically"
          echo "Check your GitLab repository's CI/CD pipelines for status"
