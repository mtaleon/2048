name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Test secret availability
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_DEPLOY_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_DEPLOY_USERNAME }}
          GITLAB_REPO: ${{ secrets.GITLAB_REPO_URL }}
        run: |
          echo "Testing secrets availability..."
          echo "GITLAB_USERNAME is set: $([[ -n "$GITLAB_USERNAME" ]] && echo 'YES' || echo 'NO')"
          echo "GITLAB_TOKEN is set: $([[ -n "$GITLAB_TOKEN" ]] && echo 'YES' || echo 'NO')"
          echo "GITLAB_REPO is set: $([[ -n "$GITLAB_REPO" ]] && echo 'YES' || echo 'NO')"
          echo "GITLAB_USERNAME length: ${#GITLAB_USERNAME}"
          echo "GITLAB_TOKEN length: ${#GITLAB_TOKEN}"
          echo "GITLAB_REPO value: ${GITLAB_REPO}"
          echo "✅ Secrets test complete"
